<!DOCTYPE html>
<html>
<head>
    <title>Voxel Game</title>
    <style>
        canvas { border: 1px solid black; display: block; margin: auto; }
        body { text-align: center; }
    </style>
</head>
<body>
    <h1>Voxel Game</h1>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div>
        <span id="fpsCounter"></span>
        <span id="positionDisplay"></span>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let blocks = {};
        let position = { x: 0, y: 0, z: 0 };
        let fps = 0;
        let lastTimestamp = 0;

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Draw blocks based on the blocks object
            for (let key in blocks) {
                const block = blocks[key];
                ctx.fillStyle = block.color;
                ctx.fillRect(block.x, block.y, 50, 50);
            }
            updateFPS();
            requestAnimationFrame(draw);
        }

        function updateFPS() {
            const now = performance.now();
            const delta = now - lastTimestamp;
            fps = Math.round(1000 / delta);
            lastTimestamp = now;
            document.getElementById('fpsCounter').innerText = `FPS: ${fps}`;
            document.getElementById('positionDisplay').innerText = `Position: (${position.x}, ${position.y}, ${position.z})`;
        }

        function placeBlock(x, y) {
            const key = `${x},${y}`;
            blocks[key] = { x: x, y: y, color: 'brown' };
        }

        function removeBlock(x, y) {
            const key = `${x},${y}`;
            delete blocks[key];
        }

        window.addEventListener('keydown', (event) => {
            switch (event.key) {
                case 'w': position.z += 1; break;
                case 's': position.z -= 1; break;
                case 'a': position.x -= 1; break;
                case 'd': position.x += 1; break;
            }
        });
        canvas.addEventListener('click', (event) => {
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((event.clientX - rect.left) / 50);
            const y = Math.floor((event.clientY - rect.top) / 50);
            if (event.ctrlKey) {
                removeBlock(x, y);
            } else {
                placeBlock(x, y);
            }
        });

        draw();
    </script>
</body>
</html>
